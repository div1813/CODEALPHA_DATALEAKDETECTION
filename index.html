<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data Leak Detection | SQL Injection Security</title>

  <!-- CryptoJS for AES-256 Encryption -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0f0f1a;
  color: #fff;
  min-height: 100vh;
  padding: 20px;
}

header {
  text-align: center;
  padding: 30px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border-radius: 12px;
  margin-bottom: 25px;
  border: 1px solid #0f3460;
}

header h1 {
  font-size: 2rem;
  color: #00d4ff;
  margin-bottom: 8px;
}

header p {
  color: #a0a0b0;
  font-size: 0.95rem;
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 25px;
}

.tabs button {
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  background: #16213e;
  color: #00d4ff;
  font-size: 1rem;
  cursor: pointer;
  border: 1px solid #0f3460;
  transition: all 0.3s;
}

.tabs button:hover {
  background: #00d4ff;
  color: #0f0f1a;
  font-weight: bold;
}

.section {
  max-width: 500px;
  margin: 0 auto;
  background: #16213e;
  padding: 35px;
  border-radius: 12px;
  border: 1px solid #0f3460;
}

.section h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #00d4ff;
  font-size: 1.5rem;
}

.section p {
  color: #a0a0b0;
  margin-bottom: 15px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px 15px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #0f3460;
  background: #0f0f1a;
  color: #fff;
  font-size: 1rem;
  outline: none;
  transition: border 0.3s;
}

input:focus {
  border-color: #00d4ff;
}

.section button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #00d4ff, #0077ff);
  color: #fff;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.3s;
}

.section button:hover {
  opacity: 0.85;
}

.message {
  margin-top: 18px;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
  display: none;
}

.success {
  background: #0d3b2e;
  color: #00ff88;
  border: 1px solid #00ff88;
  display: block;
}

.error {
  background: #3b0d0d;
  color: #ff4444;
  border: 1px solid #ff4444;
  display: block;
}

.warning {
  background: #3b2d0d;
  color: #ffaa00;
  border: 1px solid #ffaa00;
  display: block;
}

.hidden {
  display: none;
}
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>🔐 Data Leak Detection System</h1>
    <p>SQL Injection Protection + AES-256 Encryption</p>
  </header>

  <!-- TAB BUTTONS -->
  <div class="tabs">
    <button onclick="showTab('register')">📝 Register</button>
    <button onclick="showTab('login')">🔑 Login</button>
    <button onclick="showTab('demo')">🚨 Attack Demo</button>
  </div>

  <!-- REGISTER SECTION -->
  <div id="register" class="section">
    <h2>Create Account</h2>
    <input type="text" id="reg-user" placeholder="Enter Username" />
    <input type="password" id="reg-pass" placeholder="Enter Password" />
    <button onclick="registerUser()">Register</button>
    <div id="reg-msg" class="message"></div>
  </div>

  <!-- LOGIN SECTION -->
  <div id="login" class="section hidden">
    <h2>Login</h2>
    <input type="text" id="log-user" placeholder="Enter Username" />
    <input type="password" id="log-pass" placeholder="Enter Password" />
    <button onclick="loginUser()">Login</button>
    <div id="log-msg" class="message"></div>
  </div>

  <!-- ATTACK DEMO SECTION -->
  <div id="demo" class="section hidden">
    <h2>🚨 SQL Injection Attack Demo</h2>
    <p>Try typing these dangerous inputs below:</p>
    <input type="text" id="attack-input" placeholder="Try: ' OR '1'='1" />
    <button onclick="testAttack()">Test Attack</button>
    <div id="demo-msg" class="message"></div>
  </div>

  <script>
    // =====================
    // TAB SWITCHING
    // =====================
    function showTab(tabName) {
      document.getElementById('register').classList.add('hidden');
      document.getElementById('login').classList.add('hidden');
      document.getElementById('demo').classList.add('hidden');
      document.getElementById(tabName).classList.remove('hidden');
    }

    // =====================
    // SQL INJECTION DETECTOR
    // =====================
    const sqlPatterns = [
      /(\s|'|"|`)(OR|AND)(\s|'|"|`)/i,
      /--/,
      /;/,
      /DROP\s+TABLE/i,
      /SELECT\s+\*/i,
      /INSERT\s+INTO/i,
      /DELETE\s+FROM/i,
      /UNION\s+SELECT/i,
      /1\s*=\s*1/,
      /'\s*OR\s*'/i,
      /xp_/i,
      /exec\s*\(/i,
    ];

    function isSQLInjection(input) {
      return sqlPatterns.some(pattern => pattern.test(input));
    }

    // =====================
    // SHOW MESSAGE HELPER
    // =====================
    function showMessage(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = 'message ' + type;
    }

    // =====================
    // SECRET KEY FOR AES-256
    // =====================
    const SECRET_KEY = "CodeAlpha@SecureKey#2024";

    // =====================
    // ENCRYPT PASSWORD
    // =====================
    function encryptPassword(password) {
      return CryptoJS.AES.encrypt(password, SECRET_KEY).toString();
    }

    // =====================
    // DECRYPT PASSWORD
    // =====================
    function decryptPassword(encrypted) {
      const bytes = CryptoJS.AES.decrypt(encrypted, SECRET_KEY);
      return bytes.toString(CryptoJS.enc.Utf8);
    }

    // =====================
    // REGISTER USER
    // =====================
    function registerUser() {
      const username = document.getElementById('reg-user').value.trim();
      const password = document.getElementById('reg-pass').value.trim();

      // Check empty fields
      if (!username || !password) {
        showMessage('reg-msg', '⚠️ Please fill in all fields!', 'warning');
        return;
      }

      // Check SQL injection in username
      if (isSQLInjection(username)) {
        showMessage('reg-msg', '🚨 SQL Injection detected in username! Blocked!', 'error');
        return;
      }

      // Check if user already exists
      if (localStorage.getItem('user_' + username)) {
        showMessage('reg-msg', '⚠️ Username already exists! Try another.', 'warning');
        return;
      }

      // Encrypt password and save
      const encrypted = encryptPassword(password);
      localStorage.setItem('user_' + username, encrypted);

      showMessage('reg-msg',
        '✅ Registered successfully! Password encrypted with AES-256 and stored safely! 🔐',
        'success'
      );

      // Clear fields
      document.getElementById('reg-user').value = '';
      document.getElementById('reg-pass').value = '';
    }

    // =====================
    // LOGIN USER
    // =====================
    function loginUser() {
      const username = document.getElementById('log-user').value.trim();
      const password = document.getElementById('log-pass').value.trim();

      // Check empty fields
      if (!username || !password) {
        showMessage('log-msg', '⚠️ Please fill in all fields!', 'warning');
        return;
      }

      // Check SQL injection in username
      if (isSQLInjection(username)) {
        showMessage('log-msg', '🚨 SQL Injection detected! Access denied! 🛡️', 'error');
        return;
      }

      // Check SQL injection in password
      if (isSQLInjection(password)) {
        showMessage('log-msg', '🚨 SQL Injection detected in password! Access denied! 🛡️', 'error');
        return;
      }

      // Check if user exists
      const stored = localStorage.getItem('user_' + username);
      if (!stored) {
        showMessage('log-msg', '❌ Username not found! Please register first.', 'error');
        return;
      }

      // Decrypt and compare
      const decrypted = decryptPassword(stored);
      if (decrypted === password) {
        showMessage('log-msg', '✅ Login successful! Welcome back, ' + username + '! 🎉', 'success');
      } else {
        showMessage('log-msg', '❌ Wrong password! Access denied!', 'error');
      }
    }

    // =====================
    // ATTACK DEMO TESTER
    // =====================
    function testAttack() {
      const input = document.getElementById('attack-input').value.trim();

      if (!input) {
        showMessage('demo-msg', '⚠️ Please type something first!', 'warning');
        return;
      }

      if (isSQLInjection(input)) {
        showMessage('demo-msg',
          '🚨 SQL INJECTION DETECTED! Input blocked successfully. Your system is protected!',
          'error'
        );
      } else {
        showMessage('demo-msg',
          '✅ Input looks safe. No SQL injection patterns found.',
          'success'
        );
      }
    }
  </script>

</body>
</html>
